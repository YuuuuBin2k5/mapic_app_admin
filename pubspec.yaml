name: mapic_manager
description: "MAPIC Manager App - Advanced admin dashboard for MAPIC social platform"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5
  
  # UI & Design
  cupertino_icons: ^1.0.2
  fl_chart: ^0.66.0
  
  # Network & API
  dio: ^5.4.0
  json_annotation: ^4.8.1
  web_socket_channel: ^2.4.0
  
  # Dependency Injection
  get_it: ^7.6.4
  
  # Storage & Cache
  shared_preferences: ^2.2.2
  
  # Utils
  intl: ^0.19.0
  logger: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  # Code Generation
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  
  # Linting
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/